apiVersion: audit.k8s.io/v1
kind: Policy
rules:
  # Log all pod operations in audit-zone at full request/response level
  - level: RequestResponse
    verbs: ["create", "update", "patch", "delete"]
    resources:
      - group: ""
        resources: ["pods"]
    namespaces: ["audit-zone"]

  # Log secret and configmap mutations at request level (body without response)
  - level: Request
    verbs: ["create", "update", "patch", "delete"]
    resources:
      - group: ""
        resources: ["secrets", "configmaps", "serviceaccounts"]

  # Log RBAC changes at metadata level
  - level: Metadata
    verbs: ["create", "update", "patch", "delete"]
    resources:
      - group: "rbac.authorization.k8s.io"
        resources: ["roles", "clusterroles", "rolebindings", "clusterrolebindings"]

  # Suppress noisy system health checks
  - level: None
    nonResourceURLs:
      - /healthz*
      - /readyz*
      - /livez*

  # Suppress kube-proxy watch events
  - level: None
    users: ["system:kube-proxy"]
    verbs: ["watch"]
    resources:
      - group: ""
        resources: ["endpoints", "services", "services/status"]

  # Default: log metadata for everything else
  - level: Metadata
