apiVersion: audit.k8s.io/v1
kind: Policy
rules:
  # Полное тело запроса и ответа для чувствительных ресурсов.
  - level: RequestResponse
    verbs: ["create", "delete", "update", "patch", "get", "list"]
    resources:
      - group: ""
        resources: ["pods", "secrets", "configmaps", "serviceaccounts"]
      - group: "rbac.authorization.k8s.io"
        resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  # Все остальные запросы фиксируются на уровне метаданных.
  - level: Metadata
